name: Continuous Deployment (AWS)

on:
  workflow_run:
    workflows: ["Docker Build & Publish"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app && cd ~/app
            
            # Create .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
            echo "PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}" >> .env
            echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

            # Create docker-compose.yml
            cat <<EOF > docker-compose.yml
            services:
              backend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/rag-backend:latest
                ports: ["8000:8000"]
                env_file: .env
                restart: always
              frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/rag-frontend:latest
                ports: ["80:80"]
                restart: always
            EOF

            # Clean, Pull and Start
            docker system prune -af
            docker compose pull
            docker compose up -d --remove-orphans