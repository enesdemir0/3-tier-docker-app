name: 3-Tier Smoke Test (Real Integration)

on:
  push:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Real .env file
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> Backend/.env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> Backend/.env
          echo "PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}" >> Backend/.env
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> Backend/.env

      - name: Build and Start with Docker Compose
        # 🔥 FIX: Changed 'docker-compose' to 'docker compose'
        run: docker compose up -d --build

      - name: Wait for Services to Initialize
        run: sleep 25 # Increased to 25s to give AI models time to load

      - name: Check Backend Health
        # We ask the backend if it's alive on port 8000
        run: curl -f http://localhost:8000/ || exit 1

      - name: Shutdown Stack
        if: always()
        # 🔥 FIX: Changed 'docker-compose' to 'docker compose'
        run: docker compose down